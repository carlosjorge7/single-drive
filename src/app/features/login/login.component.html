<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-card">
    <div class="login-header">
      <div class="logo-wrapper">
        <div class="logo-icon">
          <i class="pi pi-cloud"></i>
        </div>
      </div>
      <h1 class="app-name">HomeDrive</h1>
      <p class="app-subtitle">Tu nube personal</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      @if (error()) {
        <div class="error-banner">
          <i class="pi pi-exclamation-triangle"></i>
          <span>{{ error() }}</span>
        </div>
      }

      <div class="field">
        <label for="username">Usuario</label>
        <div class="p-inputgroup">
          <span class="p-inputgroup-addon">
            <i class="pi pi-user"></i>
          </span>
          <input
            pInputText
            id="username"
            formControlName="username"
            placeholder="Tu nombre de usuario"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="p-inputgroup">
          <span class="p-inputgroup-addon">
            <i class="pi pi-lock"></i>
          </span>
          <p-password
            inputId="password"
            formControlName="password"
            placeholder="Tu contraseña"
            [feedback]="false"
            [toggleMask]="true"
            autocomplete="current-password"
            styleClass="w-full"
          />
        </div>
      </div>

      <div class="remember-row">
        <p-checkbox
          inputId="rememberMe"
          formControlName="rememberMe"
          [binary]="true"
          styleClass="hd-checkbox"
        />
        <label for="rememberMe" class="remember-label">Recordarme en este dispositivo</label>
      </div>

      <button
        pButton
        type="submit"
        label="Entrar"
        icon="pi pi-sign-in"
        class="login-btn"
        [loading]="loading()"
        [disabled]="form.invalid || loading()"
      ></button>
    </form>

    <p class="login-footer">HomeDrive · Red privada</p>
  </div>
</div>
