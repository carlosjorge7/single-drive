<div class="drive-shell" [class.sidebar-collapsed]="!sidebarOpen()" [class.sidebar-open]="sidebarOpen()">
  <app-drive-sidebar
    [open]="sidebarOpen()"
    (toggle)="toggleSidebar()"
  />

  <div class="drive-main">
    <app-drive-toolbar
      [user]="authService.currentUser()"
      (logout)="authService.logout()"
      (menuToggle)="toggleSidebar()"
    />

    <div class="drive-content">
      <router-outlet />
    </div>
  </div>
</div>

<!-- Upload progress panel (global, fixed bottom-right) -->
<app-upload-panel />
