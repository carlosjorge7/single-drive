<div
  class="file-card"
  [class.selected]="selection.isSelected(file.id)"
  [attr.draggable]="!trashMode ? 'true' : null"
  (dragstart)="onDragStart($event)"
  (click)="onCardClick()"
>
  <div class="card-thumbnail">
    @if (!trashMode) {
      <div class="select-check" (click)="$event.stopPropagation(); selection.toggle(file.id)">
        <div class="check-box" [class.checked]="selection.isSelected(file.id)">
          @if (selection.isSelected(file.id)) {
            <i class="pi pi-check"></i>
          }
        </div>
      </div>
    }
    @if (isProcessing) {
      <div class="processing-state">
        <i class="pi pi-spin pi-spinner"></i>
        <span>Procesando…</span>
      </div>
    } @else if (hasThumbnail) {
      <img
        [src]="file.thumbnail_small_url!"
        [alt]="file.name"
        loading="lazy"
        class="thumb-img"
      />
    } @else {
      <div class="file-icon-wrapper">
        @let iconInfo = file.mime_type | fileTypeIcon: file.file_type;
        <i class="pi {{ iconInfo.icon }}" [style.color]="iconInfo.color"></i>
      </div>
    }

    <div class="card-overlay">
      @if (trashMode) {
        <button
          pButton type="button"
          icon="pi pi-undo"
          class="p-button-rounded p-button-text overlay-btn"
          pTooltip="Restaurar"
          (click)="$event.stopPropagation(); restore.emit(file)"
        ></button>
        <button
          pButton type="button"
          icon="pi pi-times"
          class="p-button-rounded p-button-text overlay-btn danger"
          pTooltip="Eliminar permanentemente"
          (click)="$event.stopPropagation(); deletePermanent.emit(file)"
        ></button>
      } @else {
        <button
          pButton type="button"
          icon="pi pi-download"
          class="p-button-rounded p-button-text overlay-btn"
          pTooltip="Descargar"
          (click)="$event.stopPropagation(); download.emit(file)"
        ></button>
        <button
          pButton type="button"
          icon="pi pi-pencil"
          class="p-button-rounded p-button-text overlay-btn"
          pTooltip="Renombrar"
          (click)="$event.stopPropagation(); rename.emit(file)"
        ></button>
        <button
          pButton type="button"
          icon="pi pi-arrow-right-arrow-left"
          class="p-button-rounded p-button-text overlay-btn"
          pTooltip="Mover a carpeta"
          (click)="$event.stopPropagation(); move.emit(file)"
        ></button>
        <button
          pButton type="button"
          icon="pi pi-trash"
          class="p-button-rounded p-button-text overlay-btn danger"
          pTooltip="Mover a papelera"
          (click)="$event.stopPropagation(); trash.emit(file)"
        ></button>
      }
    </div>
  </div>

  <div class="card-info">
    <p class="card-name" [title]="file.name">{{ file.name }}</p>
    <p class="card-meta">{{ file.size | fileSize }} · {{ formattedDate }}</p>
  </div>
</div>
