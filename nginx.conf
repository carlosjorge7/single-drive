server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # User uploads and thumbnails served from volume
    location /uploads/ {
        alias /media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # API + file streaming (disable buffering for range requests / large uploads)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size 0;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Django static (admin CSS/JS)
    location /static/ {
        proxy_pass http://backend:8000;
    }

    # Angular hashed assets — long cache
    location ~* \.[0-9a-f]+\.(js|css|woff2|woff|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Angular SPA — no cache on HTML
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml font/woff2;
}
